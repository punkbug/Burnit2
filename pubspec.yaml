name: burnit
description: Burn It MVP prototype
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.2.1
  flutter_slidable: ^3.1.1
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
